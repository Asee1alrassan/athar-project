services:
  - type: web
    name: athar-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: CORS_ORIGINS
        value: "https://athar-dashboard.vercel.app"
    healthCheckPath: /health
